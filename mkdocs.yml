site_name: "Hacking Archive"
site_description: "Various writeups and guides for Hack The Box machines and challenges."
theme:
  name: material
  language: en
  font:
    text: Fira Code
    code: Fira Code
  palette:
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search

copyright: >
  Made with ❤️ by <a href="https://github.com/egz-dev" target="_blank" rel="noopener">egz-dev</a> — 
  <a href="https://edugarcia.dev" target="_blank" rel="noopener">edugarcia.dev</a>

# --nav-auto-start--
nav:
  - Home: index.md
  - Writeups:
      - writeups/index.md
      - Very Easy:
          - 💥 Explosion: writeups/💥 Explosion.md
          - 💾 Redeemer: writeups/💾 Redeemer.md
          - 🦌 Fawn: writeups/🦌 Fawn.md
          - 🧨 Preignition: writeups/🧨 Preignition.md
          - 🩰 Dancing: writeups/🩰 Dancing.md
  - Guides:
      - guides/index.md
      - ✅ Checklist Ctf: guides/✅ Checklist CTF.md
      - 💣 Gobuster   Practical Guide: guides/💣 Gobuster - Practical Guide.md
      - 📂 Smb   Practical Guide: guides/📂 SMB - Practical Guide.md
      - 🖥️ Xfreerdp   Practical Guide: guides/🖥️ xfreerdp - Practical Guide.md
      - 🗃️ Ftp   Practical Guide: guides/🗃️ FTP - Practical Guide.md
      - 🗄️ Redis   Practical Guide: guides/🗄️ Redis - Practical Guide.md
# --nav-auto-end--
