name: Sync Writeups

on:
  # Triggered by push events in the writeups repo
  repository_dispatch:
    types: [writeups-updated]

  # Manual trigger from GitHub UI
  workflow_dispatch:

  # Periodic sync (every 6 hours)
  schedule:
    - cron: "0 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout MkDocs repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Sync writeups from external repo
        run: python sync_writeups.py

      - name: Commit and push synced writeups
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Añadir solo los archivos sincronizados (incluye eliminaciones con -A)
          git add -A docs/writeups/ docs/guides/ docs/assets/ mkdocs.yml 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No new changes, nothing to commit."
          else
            git commit -m "Sync: writeups updated from egz-dev/HTB"
            git push
          fi
