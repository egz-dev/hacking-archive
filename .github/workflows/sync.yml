name: Sincronizar Writeups

on:
  # Permite que el repo de writeups dispare este workflow al hacer push
  repository_dispatch:
    types: [writeups-updated]

  # Permite ejecución manual desde la UI de GitHub
  workflow_dispatch:

  # Sincronización periódica (cada 6 horas)
  schedule:
    - cron: "0 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio MkDocs
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Sincronizar writeups desde repo externo
        run: python sync_writeups.py

      - name: Commit y push de writeups sincronizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Añadir solo los archivos sincronizados (incluye eliminaciones con -A)
          git add -A docs/writeups/ docs/guias/ docs/assets/ mkdocs.yml 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos, nada que commitear."
          else
            git commit -m "Sync: writeups actualizados desde egz-dev/HTB"
            git push
          fi
