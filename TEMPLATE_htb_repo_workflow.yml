# Workflow para el repositorio de writeups (egz-dev/HTB)
#
# Crea este archivo en: .github/workflows/notify-archive.yml
# en tu repositorio https://github.com/egz-dev/HTB
#
# Necesitas:
#   1. Un Personal Access Token (PAT) con scope `repo` o `workflow`
#   2. Añadir el PAT como secreto en el repo HTB: Settings → Secrets → Actions
#      Nombre del secreto: ARCHIVE_REPO_TOKEN
#   3. Ajustar ARCHIVE_REPO si tu repo de MkDocs tiene otro nombre

name: Notificar al archivo MkDocs

on:
  push:
    branches: [main, master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar actualización en el archivo MkDocs
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.ARCHIVE_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.everest-preview+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/egz-dev/hacking-archive/dispatches \
            -d '{"event_type": "writeups-updated"}'
